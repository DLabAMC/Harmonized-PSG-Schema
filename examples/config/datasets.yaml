mros:
  db_name: mros
  edf_path_column: edf_path
  subject_id_column: nsrrid
  visit_column: visit
  age_column: nsrr_age
  sex_column: nsrr_sex
  weight_column: hwwgt
  height_column: hwhgt
  bmi_column: nsrr_bmi
